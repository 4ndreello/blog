<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- a_ bitmap mark on a solid white tile. self-contained, reads on any tab theme -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#ffffff"/>
  <g fill="#14140f">
    <!-- lowercase "a" bitmap glyph, 6px cells -->
    <rect x="14" y="20" width="6" height="6"/>
    <rect x="20" y="20" width="6" height="6"/>
    <rect x="26" y="20" width="6" height="6"/>
    <rect x="26" y="26" width="6" height="6"/>
    <rect x="14" y="32" width="6" height="6"/>
    <rect x="20" y="32" width="6" height="6"/>
    <rect x="26" y="32" width="6" height="6"/>
    <rect x="32" y="32" width="6" height="6"/>
    <rect x="8" y="38" width="6" height="6"/>
    <rect x="26" y="38" width="6" height="6"/>
    <rect x="14" y="44" width="6" height="6"/>
    <rect x="20" y="44" width="6" height="6"/>
    <rect x="26" y="44" width="6" height="6"/>
    <!-- solid block cursor -->
    <rect x="44" y="20" width="12" height="30"/>
  </g>
</svg>
